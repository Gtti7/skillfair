<!DOCTYPE html>
<html>
<head>
  <title>Skill Fair 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Skill Fair 2026</h1>

  <form id="studentForm">

    <input type="text" placeholder="Full Name" id="name" required>

    <input type="text" placeholder="Course" id="course" required>

    <input type="text" placeholder="Semester" id="semester" required>

    <input type="text" placeholder="Project Name" id="project" required>

    <input type="text" placeholder="Place" id="place" required>

    <input type="email" placeholder="Email Address" id="email" required>

    <button type="submit">
      Submit Project
    </button>

  </form>

  <p id="msg"></p>

</div>

<script src="script.js"></script>

</body>
</html>
